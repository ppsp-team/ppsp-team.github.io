    your_mission:
      fr: |
        ## Votre Mission
        Vous rejoindrez le projet «Computational approaches to the phenomenology of togetherness in autism
        and non-autism». Votre mission : analyser l'expérience vécue de l'interaction sociale chez les personnes
        autistes et non-autistes, à travers des entretiens phénoménologiques et des cartes corporelles.

        **Ce que vous allez faire :**

        ### Transcription & Préparation des données
        - Transcrire les entretiens phénoménologiques
        - Préparer et organiser les données pour l'analyse
        - Assurer la qualité et la fidélité des transcriptions

        ### Codage & Analyse
        - Coder les entretiens avec Atlas.ti et logiciels open source
        - Réaliser des analyses thématiques / IPA (Interpretative Phenomenological Analysis)
        - Analyser les cartes corporelles

        ### Documentation & Méthodologie
        - Documenter les procédures de codage
        - Contribuer à l'élaboration de guides méthodologiques
        - Participer aux discussions d'équipe sur l'analyse
        
        **Impact :**
        Contribuer à mieux comprendre le vécu de l'interaction sociale chez les personnes autistes.
      en: |
        ## Your Mission
        You will join the project **«Computational approaches to the phenomenology of togetherness in autism and non-autism»**. Your mission: analyze the lived experience of social interaction in autistic and non-autistic individuals, through phenomenological interviews and body maps.
        
        **What you will do:**
        
        ### Transcription & Data Preparation
        - Transcribe phenomenological interviews
        - Prepare and organize data for analysis
        - Ensure quality and accuracy of transcriptions
        
        ### Coding & Analysis
        - Code interviews using Atlas.ti and open source software
        - Conduct thematic analysis / IPA (Interpretative Phenomenological Analysis)
        - Analyze body maps
        
        ### Documentation & Methodology
        - Document coding procedures
        - Contribute to methodological guides development
        - Participate in team discussions on analysis
        
        **Impact:**
        Contribute to better understanding the lived experience of social interaction in autistic individuals.
