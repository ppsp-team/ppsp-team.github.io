    our_mission:
      fr: |
        ## Notre Mission
        **Social NeuroAI Hub — Where minds connect**
        **Où les intelligences se rencontrent**
        Le **Laboratoire PPSP** est situé au **CHU Sainte-Justine**, l'un des plus grands hôpitaux pédiatriques
        universitaires au monde. Nous développons les sciences et technologies qui permettent de comprendre
        comment les diverses intelligences se coordonnent, se développent et s'entraident. Notre approche :
        l'**hyperscanning multimodal** enregistre simultanément cerveau, physiologie, langage et comportement
        de plusieurs personnes en interaction. L'objectif est d'explorer les **potentialités et diversités cognitives
        et méta-cognitives**. Nous créons des outils open-source, des protocoles cliniques et des connaissances
        qui, ensemble, servent directement les enfants, les familles et les soignants. **Du labo à l'hôpital, de la
        science à la santé**.
        
        ### Contexte du Projet — PRISME
        **PRISME** (Plateforme de Réalité Immersive pour le Suivi et la Mesure des Expressions cliniques) est
        un programme de recherche du Laboratoire PPSP, dédié au développement d’outils immersifs pour
        mieux comprendre le fonctionnement cognitif et moteur des jeunes ayant un trouble
        neurodéveloppemental (TND).
        
        **Notre objectif :**
        👉 Réinventer les tâches neuropsychologiques classiques en XR pour obtenir des mesures plus
        fines, plus écologiques et plus sensibles au développement.
        
        Nous transformons des tests standardisés (motricité fine, flexibilité cognitive, attention, inhibition,
        coordination visuomotrice…) en tâches interactives intégrées au Meta Quest 3.
        Les données sont ensuite combinées avec des modèles de psychiatrie computationnelle.
      en: |
        ## Our Mission
        **Social NeuroAI Hub — Where minds connect**
        **Où les intelligences se rencontrent**
        The **PPSP Laboratory** is located at **CHU Sainte-Justine**, one of the world's largest pediatric university
        hospitals. We develop the sciences and technologies that enable understanding of how diverse
        intelligences coordinate, develop, and support one another. Our approach: **multimodal hyperscanning**
        simultaneously records brain, physiology, language, and behavior of multiple people in interaction. Our
        goal is to explore **cognitive and meta-cognitive potentialities and diversities**. We create open-source
        tools, clinical protocols, and knowledge that together directly serve children, families, and healthcare
        providers. **From lab to hospital, from science to health**.
        
        ### Project Context — PRISME
        **PRISME** (Immersive Reality Platform for Monitoring and Measuring Clinical Expressions) is
        a research program at the PPSP Laboratory, dedicated to developing immersive tools to
        better understand cognitive and motor functioning in youth with neurodevelopmental
        disorders (NDD).
        
        **Our objective:**
        👉 Reinvent classic neuropsychological tasks in XR to obtain finer, more ecological, and
        developmentally sensitive measures.
        
        We transform standardized tests (fine motor skills, cognitive flexibility, attention, inhibition,
        visuomotor coordination...) into interactive tasks integrated into Meta Quest 3.
        Data are then combined with computational psychiatry models.

    your_mission:
      fr: |
        ## Votre Mission
        **Concevoir des tâches neuropsychologiques adaptées à la XR**
        
        Vous serez responsable de la conceptualisation scientifique des futures tâches PRISME, en vous
        basant sur :
        - Les tests neuropsy de référence (Purdue Pegboard, WCST, WISC, etc.)
        - Les principes de validité psychométrique (fidélité, sensibilité développementale, sensibilité interindividuelle)
        - Les contraintes expérimentales XR (interaction, ergonomie, sur-stimulation, calibration spatio-temporelle)
        - Les métriques computationnelles extraites en XR (variabilité, vitesse, erreurs spatiales, trajectoires, entropie, jitter, temps de réaction, stabilité intra-individuelle)
        
        **Concrètement, vous allez :**

        ### 1. Cartographier les tests existants
        - Analyse des objectifs cognitifs/moteurs de chaque test
        - Identification des processus sous-jacents (contrôle exécutif, séquençage, motricité fine, feedback sensorimoteur)
        
        ### 2. Définir leur transposition XR
        - Décomposition en unités d’action XR
        - Identification des affordances XR pertinentes (interactions simples, gestes naturels, manipulation virtuelle)
        - Proposition de 2–3 variantes par test selon le niveau cognitif ou moteur
        
        ### 3. Décrire les métriques pertinentes
        Pour chaque tâche XR :
        - Variables primaires (mesures principales du construit)
        - Variables secondaires (cinématique, précision, erreurs)
        - Indicateurs de performance stables vs. bruit expérimental
        - Estimation de la sensibilité attendue (développement, profils TND)
        
        ### 4. Produire les spécifications scientifiques PRISME
        👉 **Livrable principal du stage**
        Un dossier structuré comprenant :
        - Logique cognitive de la tâche
        - Hypothèses sur les métriques
        - Paramètres d’implémentation
        - Plan expérimental d’évaluation (validité, fidélité, calibration)
        
        Ces documents guideront les équipes Unity et data science pour l’implémentation dans PRISME.
      en: |
        ## Your Mission
        **Design neuropsychological tasks adapted to XR**
        
        You will be responsible for the scientific conceptualization of future PRISME tasks, based on:
        - Reference neuropsychological tests (Purdue Pegboard, WCST, WISC, etc.)
        - Psychometric validity principles (reliability, developmental sensitivity, inter-individual sensitivity)
        - XR experimental constraints (interaction, ergonomics, over-stimulation, spatio-temporal calibration)
        - Computational metrics extracted in XR (variability, speed, spatial errors, trajectories, entropy, jitter, reaction time, intra-individual stability)
        
        **Concretely, you will:**

        ### 1. Map existing tests
        - Analyze cognitive/motor objectives of each test
        - Identify underlying processes (executive control, sequencing, fine motor skills, sensorimotor feedback)
        
        ### 2. Define their XR transposition
        - Decomposition into XR action units
        - Identification of relevant XR affordances (simple interactions, natural gestures, virtual manipulation)
        - Proposal of 2–3 variants per test depending on cognitive or motor level
        
        ### 3. Describe relevant metrics
        For each XR task:
        - Primary variables (main measures of construct)
        - Secondary variables (kinematics, accuracy, errors)
        - Stable performance indicators vs. experimental noise
        - Estimation of expected sensitivity (development, NDD profiles)
        
        ### 4. Produce PRISME scientific specifications
        👉 **Main internship deliverable**
        A structured dossier including:
        - Cognitive logic of the task
        - Hypotheses on metrics
        - Implementation parameters
        - Experimental evaluation plan (validity, reliability, calibration)
        
        These documents will guide the Unity and data science teams for implementation in PRISME.

