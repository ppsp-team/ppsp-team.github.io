      fr: "Apps mobiles pour la recherche clinique pédiatrique"
      en: "Mobile Apps for Pediatric Clinical Research"
    location:
      fr: "CHU Sainte-Justine, Montréal"
      en: "CHU Sainte-Justine, Montreal"
    duration:
      fr: "12+ semaines (3+ mois)"
      en: "12+ weeks (3+ months)"
    start:
      fr: "Été 2026"
      en: "Summer 2026"
    onsite:
      fr: "3 jours/semaine minimum"
      en: "3 days/week minimum"
    
    our_mission:
      fr: |
        ## Notre Mission
        **Social NeuroAI Hub — Where minds connect**
        **Où les intelligences se rencontrent**
        Le **Laboratoire PPSP** est situé au **CHU Sainte-Justine**, l'un des plus grands hôpitaux
        pédiatriques universitaires au monde. Nous développons les sciences et technologies qui
        permettent de comprendre comment les diverses intelligences se coordonnent, se développent
        et s'entraident. Notre approche : l'**hyperscanning multimodal** enregistre simultanément
        cerveau, physiologie, langage et comportement de plusieurs personnes en interaction. L'objectif
        est d'explorer les **potentialités et diversités cognitives et méta-cognitives**. Nous créons
        des outils open-source, des protocoles cliniques et des connaissances qui, ensemble, servent
        directement les enfants, les familles et les soignants. **Du labo à l'hôpital, de la science à la
        santé**.
      en: |
        ## Our Mission
        **Social NeuroAI Hub — Where minds connect**
        **Où les intelligences se rencontrent**
        The **PPSP Laboratory** is located at **CHU Sainte-Justine**, one of the world's largest pediatric
        university hospitals. We develop the sciences and technologies that enable understanding of how
        diverse intelligences coordinate, develop, and support one another. Our approach: **multimodal
        hyperscanning** simultaneously records brain, physiology, language, and behavior of multiple
        people in interaction. Our goal is to explore **cognitive and meta-cognitive potentialities and
        diversities**. We create open-source tools, clinical protocols, and knowledge that together directly
        serve children, families, and healthcare providers. **From lab to hospital, from science to
        health**.

    your_mission:
      fr: |
        ## Votre Mission
        Nous développons des applications iOS pour tablettes destinées à la recherche clinique
        pédiatrique. Ces applications incluent des tests neuropsychologiques et
        neurophénoménologiques, des questionnaires phénotypiques, des échelles d'évaluation, des
        tests de métacognition et des « jeux » de coopération et synchronisation. Vous rejoindrez une
        équipe qui dispose déjà d'applications fonctionnelles (comme nos échelles iOS en
        neuropsychologie) avec des modules d'authentification et de synchronisation CloudKit
        réutilisables.

        **Ce que vous allez faire :**

        ### Développement
        - Concevoir et développer des applications iOS natives en Swift/SwiftUI avec architecture MVVM
        - Implémenter l'authentification via Sign in with Apple pour un usage clinique sécurisé
        - Gérer la persistance des données avec Core Data et la synchronisation via CloudKit
        - Étendre et améliorer les modules existants pour de nouvelles applications

        ### Validation & Tests
        - Écrire et maintenir des tests unitaires (XCTest) pour garantir la qualité du code
        - Participer aux tests avec utilisateurs réels (enfants, cliniciens) en environnement hospitalier
        - Valider la robustesse des applications sur différents appareils iPad

        ### Documentation & Open-Source
        - Documenter les modules réutilisables pour faciliter le développement de futures applications
        - Contribuer aux repositories open-source du laboratoire (ex : github.com/Ramdam17/IOS-Scale)
        - Rédiger la documentation technique des architectures développées

        ### Recherche Appliquée
        - Collaborer avec les stagiaires en neuropsychologie pour définir les tests, protocoles et variables
        - Adapter les interfaces aux besoins spécifiques des populations pédiatriques
        - Intégrer les retours cliniques pour améliorer l'expérience utilisateur
        
        **Impact** : Vos applications seront utilisées directement par les équipes cliniques du CHU
        Sainte-Justine pour évaluer et accompagner les enfants et leurs familles.
      en: |
        ## Your Mission
        We develop iOS applications for tablets intended for pediatric clinical research. These
        applications include neuropsychological and neurophenomenological tests, phenotypic
        questionnaires, assessment scales, metacognition tests, and cooperation/synchronization
        "games". You will join a team that already has functional applications (like our iOS
        neuropsychology scales) with reusable authentication and CloudKit synchronization modules.
        
        **What you will do:**
        
        ### Development
        - Design and develop native iOS applications in Swift/SwiftUI with MVVM architecture
        - Implement authentication via Sign in with Apple for secure clinical use
        - Manage data persistence with Core Data and synchronization via CloudKit
        - Extend and improve existing modules for new applications
        
        ### Validation & Testing
        - Write and maintain unit tests (XCTest) to ensure code quality
        - Participate in testing with real users (children, clinicians) in hospital settings
        - Validate application robustness on different iPad devices
        
        ### Documentation & Open-Source
        - Document reusable modules to facilitate development of future applications
        - Contribute to the laboratory's open-source repositories (e.g., github.com/Ramdam17/IOS-Scale)
        - Write technical documentation for developed architectures
        
        ### Applied Research
        - Collaborate with neuropsychology interns to define tests, protocols, and variables
        - Adapt interfaces to specific needs of pediatric populations
        - Integrate clinical feedback to improve user experience
        
        **Impact**: Your applications will be used directly by clinical teams at CHU Sainte-Justine to assess
        and support children and their families.

    profile:
      fr: |
        ## Profil Recherché
        **Ce qui vous anime**

        Vous êtes attiré·e par l'**exécution concrète, robuste, durable.**
        - **Orientation résultats** : Vous trouvez satisfaction dans le travail qui aboutit, les objectifs
        atteints. La finition d'un travail bien fait vous anime.
        - **Curiosité intellectuelle** : Vous voulez comprendre pourquoi on mène ces projets, comment
        ils s'inscrivent dans la recherche, à quoi ils serviront.
        - **Rigueur méthodologique** : Vous travaillez de façon structurée, documentez vos
        démarches, validez vos résultats.
        - **Esprit collaboratif** : Vous appréciez les retours, partagez vos réflexions, accueillez les
        feedbacks.
        - **Autonomie et collaboration** : Face à un problème, vous décomposez, explorez la
        documentation, testez des hypothèses. Vous naviguez naturellement entre travail autonome
        et co-construction.

        **Compétences techniques fondamentales**

        ### Obligatoires :
        - Swift & SwiftUI : maîtrise solide avec au moins un projet mené de bout en bout
        - Architecture MVVM : compréhension et application pratique
        - Git/GitHub : usage quotidien, collaboration via pull requests
        - **Lien GitHub actif avec au moins un projet iOS visible (obligatoire, pas d'alternative)**

        ### Atouts valorisés (non-obligatoires) :
        - Core Data / CloudKit : expérience avec la persistance et synchronisation de données
        - Sign in with Apple : implémentation de l'authentification Apple
        - Tests unitaires (XCTest) : expérience avec le testing iOS
        - Expérience avec des applications publiées sur l'App Store
        - Intérêt pour les neurosciences sociales et la recherche clinique

        ### Comment nous grandissons ensemble
        Ce stage est un espace de développement mutuel. Vous apporterez vos compétences et votre
        perspective, nous partagerons notre expertise scientifique et méthodologique. À travers la
        collaboration quotidienne, les revues de travail, les discussions et le mentorat, chacun·e
        développe les compétences qui font avancer le projet.
      en: |
        ## Desired Profile
        **What drives you**
        
        You are drawn to **concrete, robust, lasting execution.**
        - **Results-oriented**: You find satisfaction in work that delivers, goals achieved. The completion
        of work well done motivates you.
        - **Intellectual curiosity**: You want to understand why we pursue these projects, how they fit
        into research, what they will serve.
        - **Methodological rigor**: You work in a structured way, document your approaches, validate
        your results.
        - **Collaborative spirit**: You appreciate feedback, share your reflections, welcome input.
        - **Autonomy and collaboration**: Faced with a problem, you break it down, explore
        documentation, test hypotheses. You navigate naturally between autonomous work and
        co-construction.
        
        **Core Technical Skills**
        
        ### Required:
        - Swift & SwiftUI: solid mastery with at least one end-to-end project completed
        - MVVM architecture: understanding and practical application
        - Git/GitHub: daily use, collaboration via pull requests
        - **Active GitHub link with at least one visible iOS project (required, no alternative)**
        
        ### Valued assets (not required):
        - Core Data / CloudKit: experience with data persistence and synchronization
        - Sign in with Apple: Apple authentication implementation
        - Unit tests (XCTest): iOS testing experience
        - Experience with applications published on the App Store
        - Interest in social neurosciences and clinical research
        
        ### How we grow together
        This internship is a space for mutual development. You will bring your skills and perspective,
        we will share our scientific and methodological expertise. Through daily collaboration, work
        reviews, discussions, and mentorship, everyone develops the skills that advance the project.

    skills:
      fr: |
        ## Compétences Développées
        À la fin de ces 12+ semaines, vous aurez développé une expertise **singulière et recherchée.**

        ### Expertise Technique
        - Maîtrise avancée de Swift/SwiftUI en contexte de production clinique
        - Architecture MVVM appliquée à des applications complexes
        - Intégration Core Data + CloudKit pour synchronisation robuste
        - Bonnes pratiques de testing et documentation en environnement open-source

        ### Vision Interdisciplinaire
        *Le pont neuro-IA-clinique* : Vous comprendrez comment s'articulent neurosciences
