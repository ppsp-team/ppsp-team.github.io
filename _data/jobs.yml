        - Documentation technique des architectures développées
      en: |
        ## Skills You Will Develop
        After these 12+ weeks, you will have developed **unique and sought-after expertise.**
        
        ### Technical Expertise
        - Advanced mastery of Swift/SwiftUI in clinical production context
        - MVVM architecture applied to complex applications
        - Core Data + CloudKit integration for robust synchronization
        - Testing and documentation best practices in open-source environment
        
        ### Interdisciplinary Vision
        *The neuro-AI-clinical bridge*: You will understand how fundamental neuroscience, artificial
