    our_mission:
      fr: |
        ## Notre Mission
        **Plateforme de recherche en neurosciences sociales et IA -- Où les intelligences se rencontrent**
        Le **Laboratoire PPSP** est situé au **CHU Sainte-Justine**, l'un des plus grands hôpitaux pédiatriques
        universitaires au monde. Nous développons les sciences et technologies qui permettent de comprendre
        comment les diverses intelligences se coordonnent, se développent et s'entraident. Notre approche :
        l'**hyperscanning multimodal** enregistre simultanément cerveau, physiologie, langage et comportement de
        plusieurs personnes en interaction. L'objectif est d'explorer les **potentialités et diversités cognitives et
        méta-cognitives**. Nous créons des outils open-source, des protocoles cliniques et des connaissances qui,
        ensemble, servent directement les enfants, les familles et les soignants. **Du labo à l'hôpital, de la science à la
        santé**.
      en: |
        **Social NeuroAI Hub — Where minds connect**
        ## Our Mission
        The **PPSP Laboratory** is located at **CHU Sainte-Justine**, one of the world's largest pediatric university
        hospitals. We develop the sciences and technologies that enable understanding of how diverse intelligences
        coordinate, develop, and support one another. Our approach: **multimodal hyperscanning** simultaneously
        records brain, physiology, language, and behavior of multiple people in interaction. Our goal is to explore
        **cognitive and meta-cognitive potentialities and diversities**. We create open-source tools, clinical protocols,
        and knowledge that together directly serve children, families, and healthcare providers. **From lab to hospital,
        from science to health**.

    your_mission:
      fr: |
        ## Votre Mission
        Au sein du laboratoire PPSP, vous participerez à l'ensemble du cycle de recherche : de la conception des
        protocoles à l'analyse des données, en passant par la collecte sur le terrain. Vous contribuerez à des études
        explorant l'interaction sociale et la cognition, en utilisant des approches innovantes incluant la
        neurophénoménologie.

        **Ce que vous allez faire :**

        ### Élaboration de protocoles
        - Revue de littérature en neuropsychologie, psychologie expérimentale et neurophénoménologie
        - Conception de tâches expérimentales
        - Adaptation et validation de questionnaires
        - Design de protocoles neurophénoménologiques
        - Contribution au développement de tâches sur les outils internes du laboratoire
        
        ### Passations & collecte de données
        - Administration de tests neuropsychologiques standardisés
        - Passation de tâches expérimentales
        - Conduite d'entretiens et recueil de données subjectives (approches neurophénoménologiques)
        - Participation à la gestion logistique des sessions (planification, accueil, consentements)
        
        ### Analyses de données
        - Saisie et nettoyage de données
        - Cotation et scoring de tests neuropsychologiques
        - Analyses statistiques en collaboration avec l'équipe
        - Analyse qualitative et thématique des données neurophénoménologiques
        
        ### Documentation
        - Contribution à la rédaction de manuels de passation et procédures opératoires standardisées
        - Participation à la documentation des protocoles expérimentaux
      en: |
        ## Your Mission
        Within the PPSP laboratory, you will participate in the entire research cycle: from protocol design to data
        analysis, including field data collection. You will contribute to studies exploring social interaction and cognition,
        using innovative approaches including neurophenomenology.
        
        **What you will do**:

        ### Protocol Development
        - Literature review in neuropsychology, experimental psychology, and neurophenomenology
        - Design of experimental tasks
        - Adaptation and validation of questionnaires
        - Design of neurophenomenological protocols
        - Contribution to task development using the laboratory's internal tools
        
        ### Data Collection & Administration
        - Administration of standardized neuropsychological tests
        - Administration of experimental tasks
        - Conducting interviews and collecting subjective data (neurophenomenological approaches)
        - Participation in session logistics management (scheduling, reception, consent)
        
        ### Data Analysis
        - Data entry and cleaning
        - Scoring of neuropsychological tests
        - Statistical analyses in collaboration with the team
        - Qualitative and thematic analysis of neurophenomenological data
        
        ### Documentation
        - Contribution to administration manuals and standard operating procedures
        - Participation in experimental protocol documentation

