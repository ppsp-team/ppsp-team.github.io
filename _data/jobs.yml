        varied paths: PhD, research engineer positions, neuro-tech development, industrial careers.
        
        ### Concrete Portfolio
        - Contributions to HyPyP (internationally used library)
        - Reusable visualization scripts/modules (Python + D3.js)
        - Figure templates for scientific publications
        - New visual representations for advanced metrics (Phi ID, dynamic connectivity)

