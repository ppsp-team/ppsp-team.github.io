    our_mission:
      fr: |
        ## Notre Mission
        **Social NeuroAI Hub — Where minds connect**
        **Où les intelligences se rencontrent**
        Le **Laboratoire PPSP** est situé au **CHU Sainte-Justine**, l'un des plus grands hôpitaux pédiatriques
        universitaires au monde. Nous développons les sciences et technologies qui permettent de comprendre
        comment les diverses intelligences se coordonnent, se développent et s'entraident. Notre approche :
        l'**hyperscanning multimodal** enregistre simultanément cerveau, physiologie, langage et comportement
        de plusieurs personnes en interaction. L'objectif est d'explorer les **potentialités et diversités cognitives
        et méta-cognitives**. Nous créons des outils open-source, des protocoles cliniques et des connaissances
        qui, ensemble, servent directement les enfants, les familles et les soignants. **Du labo à l'hôpital, de la
        science à la santé**.
      en: |
        ## Our Mission
        **Social NeuroAI Hub — Where minds connect**
        **Où les intelligences se rencontrent**
        The **PPSP Laboratory** is located at **CHU Sainte-Justine**, one of the world's largest pediatric university
        hospitals. We develop the sciences and technologies that enable understanding of how diverse
        intelligences coordinate, develop, and support one another. Our approach: **multimodal hyperscanning**
        simultaneously records brain, physiology, language, and behavior of multiple people in interaction. Our
        goal is to explore **cognitive and meta-cognitive potentialities and diversities**. We create open-source
        tools, clinical protocols, and knowledge that together directly serve children, families, and healthcare
        providers. **From lab to hospital, from science to health**.

    your_mission:
      fr: |
        ## Votre Mission
        **HyPyP** est la librairie de référence pour analyser la synchronie cérébrale lors d'interactions sociales —
        utilisée quotidiennement par des chercheurs du monde entier. Votre mission : transformer des données
        complexes en visualisations belles et interprétables, à la manière de Shirley Wu qui encode plusieurs
        dimensions dans des représentations visuelles innovantes.

        **Ce que vous allez faire :**

        ### Développement & Design
        - Améliorer les visualisations existantes dans HyPyP (connectivités, synchronie, topographies, rejection mapping)
        - Créer de nouvelles modalités de représentation pour données multidimensionnelles (inspirées des approches de Shirley Wu)
        - Développer des scripts Python + D3.js réutilisables pour visualisations interactives
        - Concevoir des templates de figures pour publications scientifiques (SVG, PNG)

        ### Visualisations Scientifiques
        - Proposer des visualisations pour évaluations neuropsychologiques et neurophénoménologiques
        - Créer des représentations pour matrices de connectivité et leurs dynamiques temporelles
        - Visualiser des métriques de théorie de l'information (Phi ID, information intégrée)
        - Développer des topomaps et graphiques de synchronie physiologique

        ### Support à l'Équipe
        - Accompagner 4 doctorant·es dans la création de figures pour leurs publications
        - Collaborer avec le stagiaire développement HyPyP sur l'intégration des visualisations
        - Créer une bibliothèque de templates et guidelines visuelles pour le laboratoire
        
        **Impact** : Vos contributions seront intégrées dans HyPyP, une librairie open-source utilisée
        internationalement. Vous transformerez la façon dont les chercheurs visualisent et communiquent les
        interactions cérébrales et physiologiques.
      en: |
        ## Your Mission
        **HyPyP** is the reference library for analyzing brain synchrony during social interactions — used daily by
        researchers worldwide. Your mission: transform complex data into beautiful and interpretable
        visualizations, following the approach of Shirley Wu who encodes multiple dimensions in innovative
        visual representations.
        
        **What you will do:**
        
        ### Development & Design
        - Improve existing visualizations in HyPyP (connectivity, synchrony, topographies, rejection mapping)
        - Create new representation modalities for multidimensional data (inspired by Shirley Wu's approaches)
        - Develop reusable Python + D3.js scripts for interactive visualizations
        - Design figure templates for scientific publications (SVG, PNG)
        
        ### Scientific Visualizations
        - Propose visualizations for neuropsychological and neurophenomenological assessments
        - Create representations for connectivity matrices and their temporal dynamics
        - Visualize information theory metrics (Phi ID, integrated information)
        - Develop topomaps and physiological synchrony graphs
        
        ### Team Support
        - Support 4 PhD students in creating figures for their publications
        - Collaborate with the HyPyP development intern on visualization integration
        - Create a library of templates and visual guidelines for the laboratory
        
        **Impact**: Your contributions will be integrated into HyPyP, an internationally used open-source library. You
        will transform how researchers visualize and communicate brain and physiological interactions.

    profile:
      fr: |
        ## Profil Recherché
        **Ce qui vous anime**
        
        Vous êtes attiré·e par l'**exécution concrète, robuste, durable.** Vous trouvez satisfaction dans le travail
        qui aboutit, les objectifs atteints, la documentation qui éclaire. Vous voulez comprendre pourquoi on
        mène ces projets et comment ils serviront. Vous travaillez de façon structurée et la qualité de votre travail
        compte pour vous.
        
        Nous recherchons deux types de profils complémentaires : **développeur·se/data scientist avec
        sensibilité esthétique**, OU **étudiant·e en arts/design/communication avec solides bases en code**. Si vous
        êtes "entre deux chaises", ce stage est fait pour vous.
        
        **Compétences techniques fondamentales**
        
        - **Programmation data viz** : Python (matplotlib, seaborn, plotly) et/ou JavaScript/D3.js
        - **Design visuel** : Maîtrise des principes de design, sensibilité esthétique démontrée
        - **Données complexes** : Expérience avec données multidimensionnelles
        - **Portfolio obligatoire** : Portfolio et/ou GitHub démontrant vos projets de visualisation
        
        **Atouts valorisés (non-obligatoires)**
        - Expérience avec données neurosciences / physiologie (EEG, signaux biologiques)
        - Contributions open-source
        - Expérience avec animation / visualisations interactives
        - Familiarité avec l'écosystème Python scientifique (NumPy, Pandas, MNE-Python)
        - Formation en design, arts visuels ou communication visuelle
      en: |
        ## Desired Profile
        **What drives you**
        
        You are drawn to **concrete, robust, lasting execution.** You find satisfaction in work that delivers, goals
        achieved, documentation that clarifies. You want to understand why we pursue these projects and how
        they will serve. You work in a structured way and the quality of your work matters to you.
        
        We are looking for two complementary profile types: **developer/data scientist with aesthetic sensitivity**,
        OR **arts/design/communication student with solid coding foundations**. If you feel "between two worlds", this
        internship is for you.
        
        **Core Technical Skills**
        
        - **Data viz programming**: Python (matplotlib, seaborn, plotly) and/or JavaScript/D3.js
        - **Visual design**: Mastery of design principles, demonstrated aesthetic sensitivity
        - **Complex data**: Experience with multidimensional data
        - **Required portfolio**: Portfolio and/or GitHub demonstrating your visualization projects
        
        **Valued Assets (non-mandatory)**
        - Experience with neuroscience / physiology data (EEG, biological signals)
        - Open-source contributions
        - Experience with animation / interactive visualizations
        - Familiarity with the scientific Python ecosystem (NumPy, Pandas, MNE-Python)
        - Background in design, visual arts, or visual communication

    skills:
      fr: |
        ## Compétences Développées
        À la fin de ces 12+ semaines, vous aurez développé une expertise **singulière et recherchée.**

        ### Expertise Technique
        - Visualisation de données neuroscientifiques (EEG, synchronie, connectivité)
        - Création de librairies de visualisation open-source
        - Design de représentations innovantes pour données multidimensionnelles
        - Intégration Python + D3.js pour visualisations scientifiques interactives

        ### Vision Interdisciplinaire
        Vous comprendrez comment s'articulent neurosciences fondamentales, intelligence artificielle et
        applications cliniques. Vous saurez dialoguer avec des chercheurs en neurosciences, des ingénieurs, des
        cliniciens et des designers. Vous aurez travaillé dans un hôpital pédiatrique universitaire, observé
        comment la recherche se connecte aux besoins réels.

        ### Réseau & Trajectoires
        Vous travaillerez au CHU Sainte-Justine, avec accès aux séminaires et formations de l'écosystème IA
        montréalais (Mila, IVADO). Selon l'avancement du projet, vous pourrez co-signer des publications. Nos
        anciens stagiaires poursuivent des parcours variés : PhD, postes d'ingénieur·es recherche,
        développement en neuro-tech, carrières industrielles.

        ### Portfolio Concret
        - Contributions à HyPyP (librairie utilisée internationalement)
        - Scripts/modules de visualisation réutilisables (Python + D3.js)
        - Templates de figures pour publications scientifiques
        - Nouvelles représentations visuelles pour métriques avancées (Phi ID, connectivité dynamique)
      en: |
        ## Skills You Will Develop
        After these 12+ weeks, you will have developed **unique and sought-after expertise.**
        
        ### Technical Expertise
        - Visualization of neuroscientific data (EEG, synchrony, connectivity)
        - Creation of open-source visualization libraries
        - Design of innovative representations for multidimensional data
        - Python + D3.js integration for interactive scientific visualizations
        
        ### Interdisciplinary Vision
        You will understand how fundamental neuroscience, artificial intelligence, and clinical applications
        articulate. You will be able to dialogue with neuroscience researchers, engineers, clinicians, and
        designers. You will have worked in a pediatric university hospital, observed how research connects to real
        needs.
        
        ### Network & Trajectories
        You will work at CHU Sainte-Justine, with access to seminars and training from Montreal's AI ecosystem
