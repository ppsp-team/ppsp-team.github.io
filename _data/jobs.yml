      en: |
        ## Our Mission
        **Social NeuroAI Hub — Where minds connect**
        **Où les intelligences se rencontrent**
        The **PPSP Laboratory** is located at **CHU Sainte-Justine**, one of the world's largest pediatric university
        hospitals. We develop the sciences and technologies that enable understanding of how diverse
        intelligences coordinate, develop, and support one another. Our approach: **multimodal hyperscanning**
