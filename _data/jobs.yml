        providers. **From lab to hospital, from science to health**.

    your_mission:
      fr: |
        ## Votre Mission
        **HyPyP** est la librairie Python de référence pour analyser la synchronie inter-cerveau en hyperscanning.
        Votre mission : étendre les capacités d'analyse des dynamiques de synchronisation en développant
        de nouvelles métriques et des outils de visualisation.

        **Ce que vous allez faire :**

        ### Développement
        - Implémenter de nouvelles métriques de synchronie
        - Créer des modules de visualisation interactifs
        - Optimiser les performances des pipelines existants
        - Assurer un code robuste avec tests et benchmarks des méthodes

        ### Validation & Tests
        - Rédiger des tests unitaires et d'intégration
        - Valider les métriques sur des données synthétiques et réelles
        - Comparer les résultats avec la littérature scientifique
        - Documenter les performances et limites

        ### Documentation & Open-Source
        - Rédiger la documentation technique des nouvelles fonctionnalités
        - Créer des tutoriels et exemples d'utilisation
        - Contribuer à la documentation API
        - Participer aux revues de code et aux issues GitHub

        ### Recherche Appliquée
        - Explorer la littérature sur les métriques de synchronie inter-cerveau
        - Adapter des méthodes issues d'autres domaines (théorie de l'information, algèbre géométrique)
        - Collaborer avec les chercheurs pour tester les outils sur des données cliniques
        
        ### Projets concrets
        - Développement de métriques basées sur la théorie de l'information et l'algèbre géométrique
        - Dashboard de visualisation des résultats de synchronie
        - Application sur les études pilotes en cours au laboratoire

        **Impact**
        Vos contributions alimenteront directement les études cliniques du laboratoire sur les dynamiques
        inter-cérébrales et seront partagées avec une communauté grandissante de chercheuses et chercheurs
        en neurosciences sociales.
      en: |
        ## Your Mission
        **HyPyP** is the reference Python library for analyzing inter-brain synchrony in hyperscanning. Your mission:
        extend the analysis capabilities of synchronization dynamics by developing new metrics and
        visualization tools.
        
        **What you will do:**
        
        ### Development
        - Implement new synchrony metrics
        - Create interactive visualization modules
        - Optimize existing pipeline performance
        - Ensure robust code with tests and method benchmarks
        
        ### Validation & Testing
        - Write unit and integration tests
        - Validate metrics on synthetic and real data
        - Compare results with scientific literature
        - Document performance and limitations
        
        ### Documentation & Open-Source
        - Write technical documentation for new features
        - Create tutorials and usage examples
        - Contribute to API documentation
        - Participate in code reviews and GitHub issues
        
        ### Applied Research
        - Explore literature on inter-brain synchrony metrics
        - Adapt methods from other fields (information theory, geometric algebra)
        - Collaborate with researchers to test tools on clinical data
        
        ### Concrete Projects
        - Development of metrics based on information theory and geometric algebra
        - Dashboard for visualizing synchrony results
        - Application on ongoing pilot studies in the laboratory
        
        **Impact**
        Your contributions will directly feed into the laboratory's clinical studies on inter-brain dynamics and will be
        shared with a growing community of researchers in social neuroscience.

